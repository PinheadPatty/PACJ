controller_manager:
  ros__parameters:
    update_rate: 50
    # The brain that manages the state of the joints
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    # The brain that handles the 2-wheel rover math
    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]
    wheel_separation: 0.15  # Distance between wheels in meters
    wheel_radius: 0.03     # Radius of your wheels in meters
    use_stamped_vel: false # Set to false for simple teleop compatibility
    joints:
      - left_wheel_joint
      - right_wheel_joint
